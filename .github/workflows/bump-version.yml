name: Bump patch version

on:
    push:
        branches: [main]
        paths-ignore:
            - "frontend/package.json" # avoid infinite loop when this workflow commits

jobs:
    bump:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Bump patch version
              id: bump
              working-directory: frontend
              run: |
                  OLD=$(node -p "require('./package.json').version")
                  NEW=$(node -e "
                    const v = '$OLD'.split('.').map(Number);
                    v[2]++;
                    console.log(v.join('.'));
                  ")
                  # Update package.json in-place (no npm install needed)
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    pkg.version = '$NEW';
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
                  "
                  echo "version=$NEW" >> "$GITHUB_OUTPUT"

            - name: Commit bumped version
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add frontend/package.json
                  git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
                  git push
